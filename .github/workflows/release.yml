name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-deb:
    name: Build DEB Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            zip

      - name: Install frontend dependencies
        run: npm ci

      - name: Build DEB
        run: npm run tauri build -- -b deb

      - name: Upload DEB artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: src-tauri/target/release/bundle/deb/*.deb
          if-no-files-found: error

  build-rpm:
    name: Build RPM Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            rpm \
            zip

      - name: Install frontend dependencies
        run: npm ci

      - name: Build RPM
        run: npm run tauri build -- -b rpm

      - name: Upload RPM artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: src-tauri/target/release/bundle/rpm/*.rpm
          if-no-files-found: error

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs:
      - build-deb
      - build-rpm
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Generate release notes
        shell: bash
        run: |
          TAG_NAME="${GITHUB_REF_NAME}"
          cat > RELEASE_NOTES.md <<EOF
          ## ADB Wireless Device Farm ${TAG_NAME}

          ### Installation Assets
          * **Debian / Ubuntu**: Download the \`.deb\` package.
          * **Fedora / CentOS**: Download the \`.rpm\` package.

          ---
          *Automated release triggered by tag ${TAG_NAME}*
          EOF

      - name: Publish Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Release ${{ github.ref_name }}"
          tag_name: ${{ github.ref }}
          draft: false
          prerelease: false
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
          files: |
            dist/deb-package/**/*.deb
            dist/rpm-package/**/*.rpm
